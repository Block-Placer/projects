<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TRIVIUM — A Quiz of Knowledge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET ─────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --parchment:  #f5f0e8;
  --cream:      #faf7f2;
  --ink:        #1a1510;
  --ink-mid:    #2d2620;
  --ink-light:  #5a4f42;
  --gold:       #b8922a;
  --gold-light: #d4aa50;
  --gold-pale:  #e8d5a0;
  --rule:       rgba(184,146,42,0.25);
  --rule-dark:  rgba(184,146,42,0.5);
  --correct:    #2d5a3d;
  --wrong:      #7a2a2a;
  --correct-bg: rgba(45,90,61,0.07);
  --wrong-bg:   rgba(122,42,42,0.07);
  --serif:      'Cormorant Garamond', Georgia, serif;
  --display:    'Cinzel', 'Trajan Pro', serif;
  --fell:       'IM Fell English', Georgia, serif;
}

html{scroll-behavior:smooth}

body{
  background: var(--parchment);
  color: var(--ink);
  font-family: var(--serif);
  min-height: 100vh;
  font-size: 17px;
  line-height: 1.6;
  /* subtle paper texture via layered gradients */
  background-image:
    radial-gradient(ellipse at 20% 0%,  rgba(184,146,42,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(184,146,42,0.05) 0%, transparent 60%),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 80px,
      rgba(184,146,42,0.015) 80px,
      rgba(184,146,42,0.015) 81px
    );
}

/* ── LAYOUT ─────────────────────────────────────────────────────────── */
#app{
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3.5rem 1.5rem 5rem;
}

/* ── MASTHEAD ────────────────────────────────────────────────────────── */
.masthead{
  text-align: center;
  margin-bottom: 3.5rem;
  position: relative;
}

.masthead-rule{
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.2rem;
}
.masthead-rule::before,
.masthead-rule::after{
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.masthead-ornament{
  color: var(--gold);
  font-size: 1.1rem;
  letter-spacing: 0.3em;
}

.masthead-title{
  font-family: var(--display);
  font-size: clamp(2.2rem, 6vw, 3.8rem);
  font-weight: 700;
  letter-spacing: 0.28em;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 0.4rem;
}

.masthead-subtitle{
  font-family: var(--fell);
  font-style: italic;
  font-size: 1rem;
  color: var(--ink-light);
  letter-spacing: 0.08em;
}

.masthead-sub-rule{
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-top: 1.2rem;
}
.masthead-sub-rule::before,
.masthead-sub-rule::after{
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--rule-dark), transparent);
}
.masthead-sub-rule span{
  font-family: var(--display);
  font-size: 0.5rem;
  letter-spacing: 0.5em;
  color: var(--gold);
}

/* ── SCORE BAR ───────────────────────────────────────────────────────── */
#score-bar{
  display: none;
  gap: 0;
  margin-bottom: 2.8rem;
  border: 1px solid var(--rule-dark);
  background: var(--cream);
}
#score-bar.visible{ display: flex; }

.score-cell{
  padding: 0.6rem 2rem;
  text-align: center;
  border-right: 1px solid var(--rule);
}
.score-cell:last-child{ border-right: none; }

.score-val{
  font-family: var(--display);
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--gold);
  line-height: 1;
}
.score-lbl{
  font-family: var(--fell);
  font-style: italic;
  font-size: 0.72rem;
  color: var(--ink-light);
  letter-spacing: 0.1em;
  margin-top: 0.1rem;
}

/* ── SCREENS ─────────────────────────────────────────────────────────── */
.screen{ display: none; width: 100%; max-width: 680px; }
.screen.active{ display: block; animation: fadeUp 0.4s ease; }

@keyframes fadeUp{
  from{ opacity:0; transform:translateY(14px); }
  to  { opacity:1; transform:translateY(0); }
}

/* ── SECTION HEADING ────────────────────────────────────────────────── */
.section-heading{
  text-align: center;
  margin-bottom: 2rem;
}
.section-heading-text{
  font-family: var(--display);
  font-size: 0.65rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--gold);
}

/* ── TOPIC GRID ──────────────────────────────────────────────────────── */
.topic-grid{
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule-dark);
  margin-bottom: 2.5rem;
}

.topic-card{
  background: var(--cream);
  padding: 1.2rem 0.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  cursor: pointer;
  transition: background 0.18s;
  position: relative;
  user-select: none;
}

.topic-card:hover{
  background: #ede8df;
}

.topic-card.selected{
  background: var(--ink);
}

.topic-card.selected .topic-emoji-wrap{ filter: grayscale(1) brightness(2); }
.topic-card.selected .topic-lbl{ color: var(--gold-light); }

.topic-emoji-wrap{
  font-size: 1.5rem;
  line-height: 1;
  transition: filter 0.18s;
}

.topic-lbl{
  font-family: var(--display);
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-light);
  text-align: center;
  transition: color 0.18s;
}

/* ── BUTTON ──────────────────────────────────────────────────────────── */
.btn-primary{
  font-family: var(--display);
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  padding: 1rem 3rem;
  background: var(--ink);
  color: var(--gold-light);
  border: 1px solid var(--gold);
  cursor: pointer;
  transition: background 0.18s, color 0.18s;
  display: block;
  margin: 0 auto;
  position: relative;
}

.btn-primary::before,
.btn-primary::after{
  content: '◆';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.4rem;
  color: var(--gold);
}
.btn-primary::before{ left: 1.2rem; }
.btn-primary::after { right: 1.2rem; }

.btn-primary:disabled{
  opacity: 0.4;
  cursor: not-allowed;
}

.btn-primary:not(:disabled):hover{
  background: var(--ink-mid);
  color: var(--gold-light);
}

/* ── LOADING ─────────────────────────────────────────────────────────── */
#loading{
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
  padding: 4rem 0;
}
#loading.active{ display: flex; animation: none; }

.loading-ornament{
  font-family: var(--display);
  font-size: 0.6rem;
  letter-spacing: 0.45em;
  color: var(--gold);
  text-transform: uppercase;
  animation: loadPulse 1.8s ease-in-out infinite;
}

@keyframes loadPulse{
  0%,100%{ opacity:0.4; }
  50%{ opacity:1; }
}

/* ── GAME SCREEN ─────────────────────────────────────────────────────── */

/* progress */
.progress-wrap{
  display: flex;
  align-items: center;
  gap: 0.8rem;
  margin-bottom: 1.8rem;
}
.progress-track{
  flex: 1;
  height: 1px;
  background: var(--rule);
  position: relative;
}
.progress-fill{
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  background: var(--gold);
  transition: width 0.5s ease;
}
.progress-label{
  font-family: var(--display);
  font-size: 0.55rem;
  letter-spacing: 0.25em;
  color: var(--gold);
  white-space: nowrap;
  flex-shrink: 0;
}

/* question header */
.q-header{
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 1.2rem;
  padding-bottom: 0.8rem;
  border-bottom: 1px solid var(--rule);
}

.q-num{
  font-family: var(--display);
  font-size: 0.58rem;
  letter-spacing: 0.3em;
  color: var(--ink-light);
  text-transform: uppercase;
}

.q-diff{
  font-family: var(--fell);
  font-style: italic;
  font-size: 0.82rem;
  padding: 0.1rem 0.6rem;
  border: 1px solid;
}
.diff-Easy  { color: #2d5a3d; border-color: rgba(45,90,61,0.35); background:rgba(45,90,61,0.05); }
.diff-Medium{ color: #7a5a1a; border-color: rgba(122,90,26,0.35); background:rgba(122,90,26,0.05); }
.diff-Hard  { color: #7a2a2a; border-color: rgba(122,42,42,0.35); background:rgba(122,42,42,0.05); }

/* question card */
.q-card{
  background: var(--cream);
  border: 1px solid var(--rule-dark);
  padding: 2rem 2.2rem;
  margin-bottom: 1.4rem;
  position: relative;
}

/* corner ornaments */
.q-card::before,
.q-card::after{
  content: '';
  position: absolute;
  width: 10px; height: 10px;
  border-color: var(--gold);
  border-style: solid;
}
.q-card::before{ top: -1px; left: -1px;  border-width: 1px 0 0 1px; }
.q-card::after { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

.q-text{
  font-family: var(--fell);
  font-size: 1.25rem;
  line-height: 1.6;
  color: var(--ink);
}

/* answers */
.answers{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule-dark);
}

.ans-btn{
  background: var(--cream);
  border: none;
  padding: 0.9rem 1.1rem;
  text-align: left;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: flex-start;
  gap: 0.85rem;
  font-family: var(--serif);
  font-size: 1rem;
  color: var(--ink-mid);
  line-height: 1.4;
}

.ans-btn:not(:disabled):hover{
  background: #ede8df;
}

.ans-btn:disabled{ cursor: default; }

.ans-btn.correct{
  background: var(--correct-bg);
  color: var(--correct);
}
.ans-btn.wrong{
  background: var(--wrong-bg);
  color: var(--wrong);
}
.ans-btn.reveal{
  background: var(--cream);
  color: rgba(90,79,66,0.4);
}

@keyframes correctFlash{
  0%  { background: rgba(45,90,61,0.22); }
  100%{ background: var(--correct-bg); }
}
@keyframes wrongShake{
  0%,100%{ transform:translateX(0); }
  25%    { transform:translateX(-5px); }
  75%    { transform:translateX(5px); }
}

.ans-btn.correct{ animation: correctFlash 0.35s ease; }
.ans-btn.wrong  { animation: wrongShake  0.3s ease; }

.ans-key{
  font-family: var(--display);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  width: 1.6rem;
  height: 1.6rem;
  border: 1px solid var(--rule-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 0.05rem;
  color: var(--ink-light);
  background: var(--parchment);
  transition: border-color 0.15s, background 0.15s, color 0.15s;
}

.ans-btn.correct .ans-key{
  border-color: var(--correct);
  background: rgba(45,90,61,0.12);
  color: var(--correct);
}
.ans-btn.wrong .ans-key{
  border-color: var(--wrong);
  background: rgba(122,42,42,0.12);
  color: var(--wrong);
}
.ans-btn.reveal .ans-key{
  opacity: 0.35;
}

/* feedback */
.feedback{
  display: none;
  margin-top: 1.2rem;
  padding: 0.9rem 1.4rem;
  border: 1px solid;
  gap: 1rem;
  align-items: flex-start;
  animation: fadeIn 0.28s ease;
}
.feedback.visible{ display: flex; }
.feedback.correct-fb{
  border-color: rgba(45,90,61,0.3);
  background: var(--correct-bg);
}
.feedback.wrong-fb{
  border-color: rgba(122,42,42,0.3);
  background: var(--wrong-bg);
}

.fb-verdict{
  font-family: var(--display);
  font-size: 0.58rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
  padding-top: 0.2rem;
}
.correct-fb .fb-verdict{ color: var(--correct); }
.wrong-fb   .fb-verdict{ color: var(--wrong); }

.fb-text{
  font-family: var(--fell);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--ink-light);
  line-height: 1.45;
}

@keyframes fadeIn{
  from{ opacity:0; transform:translateY(5px); }
  to  { opacity:1; transform:translateY(0); }
}

/* nav row */
.nav-row{
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1.5rem;
}

.btn-ghost{
  font-family: var(--display);
  font-size: 0.58rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  background: none;
  border: 1px solid var(--rule-dark);
  color: var(--ink-light);
  padding: 0.65rem 1.4rem;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.btn-ghost:hover{
  border-color: var(--gold);
  color: var(--ink);
}

.btn-advance{
  font-family: var(--display);
  font-size: 0.58rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  background: var(--ink);
  border: 1px solid var(--gold);
  color: var(--gold-light);
  padding: 0.65rem 1.6rem;
  cursor: pointer;
  transition: background 0.15s;
  display: none;
}
.btn-advance.visible{ display: block; }
.btn-advance:hover{ background: var(--ink-mid); }

/* ── RESULTS ─────────────────────────────────────────────────────────── */
#results{ text-align: center; }

.res-seal{
  width: 140px; height: 140px;
  border-radius: 50%;
  border: 1px solid var(--gold);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1.8rem;
  position: relative;
  background: var(--cream);
}
.res-seal::before{
  content: '';
  position: absolute;
  inset: 5px;
  border-radius: 50%;
  border: 1px solid var(--rule-dark);
}
.res-seal::after{
  content: '';
  position: absolute;
  inset: 11px;
  border-radius: 50%;
  border: 1px solid var(--rule);
}

.res-num{
  font-family: var(--display);
  font-size: 2.6rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
  position: relative;
  z-index: 1;
}
.res-denom{
  font-family: var(--fell);
  font-style: italic;
  font-size: 0.85rem;
  color: var(--ink-light);
  position: relative;
  z-index: 1;
}

.res-title{
  font-family: var(--display);
  font-size: clamp(1.4rem,4vw,2rem);
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--ink);
  margin-bottom: 0.5rem;
}

.res-grade{
  font-family: var(--fell);
  font-style: italic;
  font-size: 1.1rem;
  color: var(--gold);
  margin-bottom: 2.2rem;
}

.res-rule{
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 1.5rem 0;
}

.res-stats{
  display: flex;
  gap: 0;
  justify-content: center;
  background: var(--rule);
  border: 1px solid var(--rule-dark);
  margin: 0 auto 2.5rem;
  max-width: 400px;
}
.stat-cell{
  flex: 1;
  background: var(--cream);
  padding: 1rem 1.2rem;
  border-right: 1px solid var(--rule);
  text-align: center;
}
.stat-cell:last-child{ border-right: none; }

.stat-num{
  font-family: var(--display);
  font-size: 1.6rem;
  font-weight: 600;
  line-height: 1;
}
.stat-lbl{
  font-family: var(--fell);
  font-style: italic;
  font-size: 0.75rem;
  color: var(--ink-light);
  margin-top: 0.15rem;
}

.res-btns{
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

/* ── RESPONSIVE ──────────────────────────────────────────────────────── */
@media(max-width:600px){
  .topic-grid{ grid-template-columns:repeat(2,1fr); }
  .answers{ grid-template-columns:1fr; }
  .res-stats{ max-width:100%; }
  .q-card{ padding:1.5rem 1.3rem; }
}
</style>
</head>
<body>

<div id="app">

  <!-- MASTHEAD -->
  <header class="masthead">
    <div class="masthead-rule">
      <div class="masthead-ornament">✦ ✦ ✦</div>
    </div>
    <div class="masthead-title">TRIVIUM</div>
    <div class="masthead-subtitle">A Compendium of General Knowledge</div>
    <div class="masthead-sub-rule"><span>✦</span></div>
  </header>

  <!-- SCORE BAR -->
  <div id="score-bar">
    <div class="score-cell">
      <div class="score-val" id="sb-correct">0</div>
      <div class="score-lbl">Correct</div>
    </div>
    <div class="score-cell">
      <div class="score-val" id="sb-wrong">0</div>
      <div class="score-lbl">Incorrect</div>
    </div>
    <div class="score-cell">
      <div class="score-val" id="sb-pct">—</div>
      <div class="score-lbl">Accuracy</div>
    </div>
  </div>

  <!-- HOME -->
  <div id="home" class="screen active">
    <div class="section-heading">
      <div class="section-heading-text">Select a Discipline</div>
    </div>
    <div class="topic-grid" id="topic-grid"></div>
    <button class="btn-primary" id="btn-start" disabled>Commence the Examination</button>
  </div>

  <!-- LOADING -->
  <div id="loading">
    <div class="loading-ornament">Preparing your examination &nbsp;· · ·</div>
  </div>

  <!-- GAME -->
  <div id="game" class="screen">
    <div class="progress-wrap">
      <div class="progress-label" id="progress-label">I of V</div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="q-header">
      <span class="q-num" id="q-num">Question the First</span>
      <span class="q-diff" id="q-diff">Easy</span>
    </div>

    <div class="q-card">
      <p class="q-text" id="q-text"></p>
    </div>

    <div class="answers" id="answers"></div>

    <div class="feedback" id="feedback">
      <span class="fb-verdict" id="fb-verdict"></span>
      <span class="fb-text" id="fb-text"></span>
    </div>

    <div class="nav-row">
      <button class="btn-ghost" onclick="goHome()">← Return to Index</button>
      <button class="btn-advance" id="btn-next" onclick="nextQuestion()">Proceed →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="screen">
    <div class="res-title">Examination Complete</div>

    <div class="res-rule"></div>

    <div class="res-seal">
      <div class="res-num" id="res-num">0</div>
      <div class="res-denom" id="res-denom">of V correct</div>
    </div>

    <div class="res-grade" id="res-grade"></div>

    <div class="res-stats">
      <div class="stat-cell">
        <div class="stat-num" id="res-correct" style="color:var(--correct)">0</div>
        <div class="stat-lbl">Correct</div>
      </div>
      <div class="stat-cell">
        <div class="stat-num" id="res-wrong" style="color:var(--wrong)">0</div>
        <div class="stat-lbl">Incorrect</div>
      </div>
      <div class="stat-cell">
        <div class="stat-num" id="res-pct" style="color:var(--gold)">—</div>
        <div class="stat-lbl">Accuracy</div>
      </div>
    </div>

    <div class="res-rule"></div>

    <div class="res-btns">
      <button class="btn-ghost" onclick="goHome()">Change Discipline</button>
      <button class="btn-primary" onclick="playAgain()" style="margin:0">Sit Again</button>
    </div>
  </div>

</div><!-- /#app -->

<script>
/* ── DATA ─────────────────────────────────────────────────────────── */
const TOPICS = [
  {id:"science",     label:"Sciences",     emoji:"🔬"},
  {id:"history",     label:"History",      emoji:"🏛️"},
  {id:"geography",   label:"Geography",    emoji:"🌍"},
  {id:"pop-culture", label:"Pop Culture",  emoji:"🎬"},
  {id:"sports",      label:"Sports",       emoji:"⚽"},
  {id:"technology",  label:"Technology",   emoji:"💻"},
  {id:"food",        label:"Food & Drink", emoji:"🍽️"},
  {id:"mythology",   label:"Mythology",    emoji:"⚡"},
];

const ORDINALS = ["the First","the Second","the Third","the Fourth","the Fifth",
                   "the Sixth","the Seventh","the Eighth","the Ninth","the Tenth"];
const ROMAN    = ["I","II","III","IV","V","VI","VII","VIII","IX","X"];
const KEYS     = ["A","B","C","D"];
const PER_ROUND = 5;

    {q:"Who is the goddess of the sun in Japanese Shintō mythology?",        o:["Izanami","Benzaiten","Amaterasu","Inari"],                                  a:2,d:"Medium",e:"Amaterasu, the Great Divinity Illuminating Heaven, is the Shintō goddess of the sun and among the most revered deities in Japan."},
    {q:"Which creature of Greek mythology could petrify those who gazed upon it?", o:["Hydra","Scylla","Basilisk","Medusa"],                                 a:3,d:"Easy",  e:"Medusa, one of the three Gorgons, had the power to turn any who looked directly at her into stone."},
    {q:"Who serves as the trickster deity in Norse mythology?",               o:["Odin","Loki","Tyr","Baldr"],                                               a:1,d:"Easy",  e:"Loki, a shape-shifter of great cunning, is the trickster god of Norse mythology."},
    {q:"What is the name of the feathered serpent deity of the Aztec pantheon?", o:["Huitzilopochtli","Tlaloc","Quetzalcoatl","Tezcatlipoca"],               a:2,d:"Hard",  e:"Quetzalcoatl, the feathered serpent, was one of the most significant and venerated deities in Aztec religion."},
  ],
};

/* ── STATE ──────────────────────────────────────────────────────────── */
let selectedTopic = null;
let questions     = [];
let qIndex        = 0;
let correct       = 0;
let wrong         = 0;
let answered      = false;

/* ── UTILITIES ───────────────────────────────────────────────────────── */
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function toRoman(n){
  return ROMAN[n] || String(n+1);
}

function getGrade(ratio){
  if(ratio>=1.0) return 'A perfect score — truly exemplary.';
  if(ratio>=0.8) return 'An excellent result — well above par.';
  if(ratio>=0.6) return 'A creditable performance — above average.';
  if(ratio>=0.4) return 'A modest result — further study is recommended.';
  return 'A poor result — considerable revision is required.';
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('loading').classList.remove('active');
  const el=document.getElementById(id);
  if(el){ el.classList.remove('active'); void el.offsetWidth; el.classList.add('active'); }
}

function updateScoreBar(){
  const total=correct+wrong;
  document.getElementById('sb-correct').textContent=correct;
  document.getElementById('sb-wrong').textContent=wrong;
  document.getElementById('sb-pct').textContent=total>0?Math.round((correct/total)*100)+'%':'—';
  document.getElementById('score-bar').classList.toggle('visible',total>0);
}

/* ── BUILD TOPIC GRID ─────────────────────────────────────────────── */
(function buildGrid(){
  const grid=document.getElementById('topic-grid');
  TOPICS.forEach(t=>{
    const card=document.createElement('div');
    card.className='topic-card';
    card.dataset.id=t.id;
    card.innerHTML=`<span class="topic-emoji-wrap">${t.emoji}</span><span class="topic-lbl">${t.label}</span>`;
    card.addEventListener('click',()=>selectTopic(t.id));
    grid.appendChild(card);
  });
})();

/* ── TOPIC SELECTION ─────────────────────────────────────────────── */
function selectTopic(id){
  selectedTopic=id;
  document.querySelectorAll('.topic-card').forEach(c=>{
    c.classList.toggle('selected',c.dataset.id===id);
  });
  document.getElementById('btn-start').disabled=false;
}

document.getElementById('btn-start').addEventListener('click',()=>{
  if(selectedTopic) startGame();
});

/* ── GAME FLOW ────────────────────────────────────────────────────── */
function startGame(){
  questions=shuffle(Q[selectedTopic]).slice(0,PER_ROUND);
  qIndex=correct=wrong=0;
  answered=false;

  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('score-bar').classList.remove('visible');
  const loading=document.getElementById('loading');
  loading.classList.add('active');

  setTimeout(()=>{
    loading.classList.remove('active');
    renderQuestion();
    showScreen('game');
  }, 650);
}

function renderQuestion(){
  const q=questions[qIndex];
  answered=false;

  // progress
  const pct=Math.round((qIndex/PER_ROUND)*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-label').textContent=`${toRoman(qIndex)} of ${toRoman(PER_ROUND-1)+' '}`.trim().replace(/\s+/,' ');
  // simpler label
  document.getElementById('progress-label').textContent=`${ROMAN[qIndex]} of ${ROMAN[PER_ROUND-1]}`;

  // header
  document.getElementById('q-num').textContent=`Question the ${ORDINALS[qIndex]}`;
  const diffEl=document.getElementById('q-diff');
  diffEl.textContent=q.d;
  diffEl.className=`q-diff diff-${q.d}`;

  // text
  document.getElementById('q-text').textContent=q.q;

  // answers
  const container=document.getElementById('answers');
  container.innerHTML='';
  q.o.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='ans-btn';
    btn.innerHTML=`<span class="ans-key">${KEYS[i]}</span>${opt}`;
    btn.addEventListener('click',()=>selectAnswer(i));
    container.appendChild(btn);
  });

  // reset feedback & next
  document.getElementById('feedback').className='feedback';
  document.getElementById('btn-next').className='btn-advance';
}

function selectAnswer(idx){
  if(answered) return;
  answered=true;

  const q=questions[qIndex];
  const btns=document.querySelectorAll('.ans-btn');
  const isCorrect=idx===q.a;

  btns.forEach((btn,i)=>{
    btn.disabled=true;
    if(i===q.a)      btn.classList.add('correct');
    else if(i===idx) btn.classList.add('wrong');
    else             btn.classList.add('reveal');
  });

  if(isCorrect) correct++; else wrong++;
  updateScoreBar();

  // feedback
  const fb=document.getElementById('feedback');
  document.getElementById('fb-verdict').textContent=isCorrect?'Correct':'Incorrect';
  document.getElementById('fb-text').textContent=q.e;
  fb.className=`feedback visible ${isCorrect?'correct-fb':'wrong-fb'}`;

  // progress fill update
  document.getElementById('progress-fill').style.width=`${((qIndex+1)/PER_ROUND)*100}%`;

  // next button
  const nextBtn=document.getElementById('btn-next');
  nextBtn.textContent=(qIndex+1<PER_ROUND)?'Proceed →':'View Results →';
  nextBtn.classList.add('visible');
}

function nextQuestion(){
  qIndex++;
  if(qIndex>=PER_ROUND) showResults();
  else renderQuestion();
}

/* ── RESULTS ─────────────────────────────────────────────────────── */
function showResults(){
  const pct=Math.round((correct/PER_ROUND)*100);

  document.getElementById('res-num').textContent=correct;
  document.getElementById('res-denom').textContent=`of ${PER_ROUND} correct`;
  document.getElementById('res-grade').textContent=getGrade(correct/PER_ROUND);
  document.getElementById('res-correct').textContent=correct;
  document.getElementById('res-wrong').textContent=wrong;
  document.getElementById('res-pct').textContent=pct+'%';

  showScreen('results');
}

function playAgain(){ startGame(); }
function goHome(){
  document.getElementById('score-bar').classList.remove('visible');
  showScreen('home');
}
</script>
</body>
</html>
